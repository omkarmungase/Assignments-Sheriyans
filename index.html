<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments - Sheryians</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      text-align:center;
    }

    h1{
      font-size:3rem;
      margin-bottom:30px;
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    a{
      text-decoration:none;
      color:white;
      border:1px solid #444;
      padding:15px 30px;
      border-radius:10px;
      transition:0.3s;
      background:#1a1a1a;
    }

    a:hover{
      background:white;
      color:black;
      transform:translateY(-3px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Assignments</h1>

    <div class="links">
      <a href="./assignment1/">Assignment 1</a>
      <a href="./assignment2/">Assignment 2</a>
      <a href="./assignment3/">Assignment 3</a>
      <a href="./assignment3/">Assignment 4</a>
      
    </div>
  </div>

</body>
</html>
